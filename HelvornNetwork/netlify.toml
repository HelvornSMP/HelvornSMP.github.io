[build]
  publish = "."

[[edge_functions]]
  function = "update-status"
  path = "/api/update-status"

[functions]
  external_node_modules = ["@supabase/supabase-js"]

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
